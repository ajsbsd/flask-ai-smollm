<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OpenBSD Presentation</title>

<style>

body {
    background:#111;
    color:#ddd;
    font-family:monospace;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.viewer {
    border:1px solid #444;
    padding:20px;
}

#frame {
    width:100%;
    max-height:500px;
    object-fit:contain;
    background:black;
}

#transcript {
    margin-top:15px;
    min-height:120px;
    border:1px solid #333;
    padding:10px;
}

.controls {
    margin-top:15px;
}

button {
    padding:8px 20px;
}

</style>
</head>
<body>

<div class="viewer">

    <img id="frame">

    <div id="transcript"></div>

    <audio id="audio" controls>
        <source src="{{ audio_url }}">
    </audio>

    <div class="controls">
        <button onclick="prevSlide()">←</button>
        <button onclick="nextSlide()">→</button>
    </div>

</div>

<script>

const slides = {{ slides|tojson }};

let current = 0;

const frame = document.getElementById("frame");
const transcript = document.getElementById("transcript");
const audio = document.getElementById("audio");

function showSlide(idx)
{
    current = idx;

    frame.src = slides[idx].image;
    transcript.innerText = slides[idx].text;
}

audio.addEventListener("timeupdate", () =>
{
    let t = audio.currentTime;

    for(let i=0;i<slides.length;i++)
    {
        if(t >= slides[i].start &&
           t < slides[i].end)
        {
            if(i !== current)
                showSlide(i);

            break;
        }
    }
});

function nextSlide()
{
    if(current < slides.length - 1)
    {
        showSlide(current + 1);
        audio.currentTime = slides[current].start;
    }
}

function prevSlide()
{
    if(current > 0)
    {
        showSlide(current - 1);
        audio.currentTime = slides[current].start;
    }
}

showSlide(0);

</script>

</body>
</html>
