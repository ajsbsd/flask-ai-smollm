<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AJSBSD_TERMINAL_V1.0</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41; /* Classic Matrix/Terminal Green */
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            overflow: hidden;
        }
        #terminal {
            height: 85vh;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 15px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: inset 0 0 10px #000;
        }
        #input-line {
            display: flex;
            margin-top: 10px;
        }
        .prompt { color: #00ff41; font-weight: bold; margin-right: 10px; }
        input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            width: 100%;
        }
        .output-block { margin-bottom: 10px; white-space: pre-wrap; }
        .system-msg { color: #888; font-style: italic; }
        /* CRT Scanline Effect */
        #terminal::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="terminal">
    <div class="output-block system-msg">
        AJSBSD(tm) Kernel 5.4.0-ready (Build 2024)<br>
        AI_MODULE: SmolLM-135M Loaded...<br>
        Type 'help' to begin.
    </div>
    <div id="history"></div>
    <div id="input-line">
        <span class="prompt">guest@ajsbsd:~$</span>
        <input type="text" id="cmd-input" autofocus autocomplete="off">
    </div>
</div>

<script>
    const input = document.getElementById('cmd-input');
    const history = document.getElementById('history');
    const terminal = document.getElementById('terminal');

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const command = input.value;
            input.value = '';
            
            // Add to UI history
            appendOutput(`guest@ajsbsd:~$ ${command}`, 'prompt');

            // Send to Backend
            const response = await fetch('/api/exec', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ command: command })
            });
            const data = await response.json();

            if (data.action === 'clear') {
                history.innerHTML = '';
            } else {
                appendOutput(data.output);
            }
            terminal.scrollTop = terminal.scrollHeight;
        }
    });

    function appendOutput(text, className = 'output-block') {
        const div = document.createElement('div');
        div.className = className;
        div.innerText = text;
        history.appendChild(div);
    }
    
    // Auto-focus input on click anywhere
    document.addEventListener('click', () => input.focus());
</script>

</body>
</html>
