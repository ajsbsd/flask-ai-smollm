{% extends "base.html" %}
{% block title %}Edit Post - {{ app_name }}{% endblock %}
{% block content %}
<section style="max-width: 600px; margin: 0 auto;">
    <h2>Edit Post</h2>
    <form action="{{ url_for('edit_post', post_id=post['id']) }}" method="POST">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ post['title'] }}" required>
        
        <label for="content">Content</label>
        <textarea id="content" name="content" required style="min-height: 200px;">{{ post['content'] }}</textarea>
        
        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button type="submit">Update</button>
            <a href="{{ url_for('admin_dashboard') }}" class="button outline secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
